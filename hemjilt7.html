<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физик 7-р анги - Хэмжилт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #16a085; --accent: #1abc9c; --success: #2ecc71; --error: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #16a085 0%, #2c3e50 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #quiz-container { background: rgba(255, 255, 255, 0.98); padding: 35px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 90%; max-width: 450px; text-align: center; position: relative; }
        .hidden { display: none !important; }
        .option-btn { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #ecf0f1; border-radius: 12px; background: white; cursor: pointer; font-size: 1rem; transition: 0.3s; font-weight: 500; color: var(--dark); }
        .option-btn:hover { border-color: var(--primary); background: #f4fdfb; transform: translateY(-2px); }
        input[type="text"] { width: 85%; padding: 15px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 25px; font-size: 1.1rem; text-align: center; outline: none; }
        .start-btn { background: var(--primary); color: white; border: none; padding: 16px 50px; border-radius: 35px; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(22, 160, 133, 0.4); }
        #timer-display { font-size: 2rem; font-weight: 900; color: var(--error); margin-bottom: 15px; }
        #feedback-icon { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; z-index: 1000; pointer-events: none; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.4s; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="feedback-icon"></div>

    <div id="setup-screen">
        <div style="font-size: 4.5rem; margin-bottom: 10px;">📏</div>
        <h2 style="color: var(--dark);">ФИЗИК - VII АНГИ</h2>
        <p style="color: #7f8c8d;">Биеийн шинж чанар ба хэмжилт</p>
        <input type="text" id="student-name" placeholder="Сурагчийн нэр...">
        <br>
        <button class="start-btn animate__animated animate__pulse animate__infinite" onclick="startQuiz()">ЭХЛЭХ 🚀</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="timer-display">30</div>
        <div id="q-emoji" style="font-size: 2.5rem; margin-bottom: 10px;"></div>
        <p id="question-text" style="font-weight: bold; font-size: 1.2rem; min-height: 70px; color: var(--dark);"></p>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Аялал дууслаа!</h2>
        <h1 id="final-score" style="font-size: 4.5rem; color: var(--primary);"></h1>
        <p id="feedback-msg" style="font-weight: bold; font-size: 1.15rem; color: #34495e;"></p>
        <p id="status-text" style="color: #95a5a6; font-style: italic; margin-top: 20px;">Багшид илгээж байна...</p>
        <button onclick="location.reload()" style="background: #ecf0f1; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; margin-top: 20px;">Дахин эхлэх 🔄</button>
    </div>
</div>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const questions = [
        { q: "Уртыг хэмжих Олон Улсын нэгж (SI) аль нь вэ?", a: ["Сантиметр (см)", "Метр (м)", "Километр (км)", "Миллиметр (мм)"], c: 1, e: "📏" },
        { q: "Шингэний эзлэхүүнийг ямар багажаар хэмждэг вэ?", a: ["Шугам", "Дэнс", "Мензурк", "Термометр"], c: 2, e: "🧪" },
        { q: "Бодисын нягтыг ямар томьёогоор олдог вэ?", a: ["ρ = m * V", "ρ = V / m", "ρ = m / V", "ρ = m + V"], c: 2, e: "⚖️" },
        { q: "1 литр нь хэдэн миллилитртэй (мл) тэнцүү вэ?", a: ["10 мл", "100 мл", "1000 мл", "10000 мл"], c: 2, e: "💧" },
        { q: "Биеийн массыг хэмжих үндсэн нэгж аль нь вэ?", a: ["Ньютон", "Килограмм (кг)", "Литр", "Метр"], c: 1, e: "📦" },
        { q: "Хэмжих багажийн хамгийн бага хуваарийн утгыг юу гэх вэ?", a: ["Хэмжих хязгаар", "Хуваарийн утга", "Алдаа", "Урт"], c: 1, e: "🔍" },
        { q: "Биеийн эзлэхүүн гэж юу вэ?", a: ["Гадаргуугийн хэмжээ", "Биеийн эзлэх орон зайн хэмжээ", "Биеийн жин", "Биеийн өндөр"], c: 1, e: "🧊" },
        { q: "1 см² талбай нь хэдэн мм²-тэй тэнцүү вэ?", a: ["10 мм²", "100 мм²", "1000 мм²", "0.1 мм²"], c: 1, e: "📐" },
        { q: "Биеийн массыг ямар багажаар хэмждэг вэ?", a: ["Мензурк", "Спидометр", "Дэнс", "Шугам"], c: 2, e: "⚖️" },
        { q: "Бие халах үед түүний эзлэхүүн хэрхэн өөрчлөгддөг вэ?", a: ["Багасна", "Томорно", "Өөрчлөгдөхгүй", "Устлана"], c: 1, e: "🔥" }
    ];

    let current = 0, score = 0, sName = "", timeLeft = 30, timer;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYYHD4Euuspk1GrSCs2s5FIMi4Rgqmzgmh4jbZwFHofyA0ELewsVt7FtdS7IgjgCki/exec";

    function startQuiz() {
        sName = document.getElementById('student-name').value;
        if(!sName.trim()) return alert("Нэрээ оруулна уу!");
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        if(current >= questions.length) return finish();
        const q = questions[current];
        document.getElementById('q-emoji').innerText = q.e;
        document.getElementById('question-text').innerText = (current + 1) + ". " + q.q;
        document.getElementById('progress-fill').style.width = (current / questions.length * 100) + "%";
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn animate__animated animate__fadeInUp';
            btn.innerText = opt;
            btn.onclick = () => check(idx, btn);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        clearInterval(timer); timeLeft = 30;
        document.getElementById('timer-display').innerText = timeLeft;
        timer = setInterval(() => {
            timeLeft--; document.getElementById('timer-display').innerText = timeLeft;
            if(timeLeft <= 0) check(-1, null);
        }, 1000);
    }

    function check(idx, btn) {
        clearInterval(timer);
        const icon = document.getElementById('feedback-icon');
        if(idx === questions[current].c) {
            score++;
            if(btn) btn.style.background = "#2ecc71";
            if(btn) btn.style.color = "white";
            icon.innerHTML = "✅";
            document.getElementById('snd-correct').play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            if(btn) btn.style.background = "#e74c3c";
            if(btn) btn.style.color = "white";
            icon.innerHTML = "❌";
            document.getElementById('snd-wrong').play();
        }
        setTimeout(() => { icon.innerHTML = ""; current++; showQ(); }, 1200);
    }

    function finish() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score + "/10";
        document.getElementById('snd-win').play();

        let msg = score >= 9 ? "Маш сайн байна! 🌟" : (score >= 6 ? "Сайн байна, бага зэрэг анхаар! 👍" : "Дахин уншаарай! 💪");
        document.getElementById('feedback-msg').innerText = msg;

        // GOOGLE SHEET РҮҮ ИЛГЭЭХ
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                "Сурагч": sName,
                "Сэдэв": "7-р анги Физик - Хэмжилт",
                "Оноо": score,
                "Дүгнэлт": msg
            }),
            headers: { 'Content-Type': 'application/json' }
        }).then(() => {
            document.getElementById('status-text').innerText = "Багшид амжилттай илгээгдлээ ✅";
        });
    }
</script>
</body>
</html>
