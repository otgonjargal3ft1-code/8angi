<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физик 9-р анги</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #0984e3; --accent: #00cec9; --success: #00b894; --error: #d63031; }
        body { font-family: sans-serif; background: #2d3436; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #2d3436; }
        #quiz-container { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        .option-btn { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #eee; border-radius: 12px; background: white; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .option-btn:hover { border-color: var(--primary); }
        input[type="text"] { width: 80%; padding: 15px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 20px; font-size: 1rem; text-align: center; }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        #timer-display { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        #feedback-text { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: bold; z-index: 999; pointer-events: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="feedback-text"></div>

    <div id="setup-screen">
        <div style="font-size: 4rem;">🧪</div>
        <h2>ФИЗИК - IX АНГИ</h2>
        <p>Бодисын бүтэц, дулаан</p>
        <input type="text" id="student-name" placeholder="Нэрээ бичнэ үү...">
        <br>
        <button class="start-btn" onclick="startQuiz()">ЭХЛЭХ ⚡</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer-display">30</div>
        <div id="q-emoji" style="font-size: 3rem;"></div>
        <p id="question-text" style="font-weight: bold; font-size: 1.2rem;"></p>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Дууслаа!</h2>
        <h1 id="final-score" style="font-size: 4rem; color: var(--primary);"></h1>
        <p id="feedback-msg"></p>
        <p id="status-text" style="color: gray;">Үр дүнг илгээж байна...</p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">Дахин эхлэх</button>
    </div>
</div>

        { q: "Цельсийн шатлалын 100°C температур Кельвиний шатлалаар хэд байх вэ?", a: ["0 K", "273 K", "373 K", "100 K"], c: 2, e: "🌡️" },
        { q: "Бодис хатуу төлөвөөс шууд хийн төлөвт шилжих үзэгдлийг юу гэх вэ?", a: ["Уурших", "Конденсаци", "Сублимаци", "Кристалжих"], c: 2, e: "☁️" },
